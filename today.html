<title>Today · Frankfurt</title>
<style>
  :root {
    --bg: #0a0a0a; --card: #141414; --border: #222;
    --text: #e0e0e0; --dim: #888; --accent: #ff6a00;
    --green: #2ecc71; --blue: #3498db; --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    max-width: 480px; margin: 0 auto; padding: 16px 16px 48px;
    -webkit-text-size-adjust: 100%;
  }

  .header {
    text-align: center; padding: 16px 0 12px;
    border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .header .day-badge {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent); font-weight: 700;
  }
  .header h1 { font-size: 1.2rem; margin: 4px 0 2px; }
  .header .date { color: var(--dim); font-size: 0.8rem; }

  /* WEATHER — TOP PRIORITY */
  .weather-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .weather-card .w-main { display: flex; align-items: center; gap: 12px; }
  .weather-card .w-icon { font-size: 2rem; }
  .weather-card .w-temp { font-size: 1.8rem; font-weight: 700; }
  .weather-card .w-lo { color: var(--dim); font-size: 0.9rem; }
  .weather-card .w-detail { font-size: 0.78rem; color: var(--dim); }
  .weather-card .w-alert {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 12px;
    background: rgba(255,106,0,0.12); color: var(--accent);
  }

  .status-strip {
    display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .pill {
    font-size: 0.7rem; padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); white-space: nowrap;
  }
  .pill.good { border-color: var(--green); color: var(--green); }
  .pill.warn { border-color: var(--accent); color: var(--accent); }
  .pill.alert { border-color: var(--red); color: var(--red); }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .card h2 { font-size: 0.95rem; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .card h2 .icon { font-size: 1.1rem; }

  .tl-item {
    display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-time {
    font-size: 0.75rem; color: var(--accent); font-weight: 700;
    min-width: 68px; text-align: right; padding-top: 1px;
  }
  .tl-body { flex: 1; font-size: 0.85rem; }
  .tl-body .sub { font-size: 0.75rem; color: var(--dim); margin-top: 2px; }

  /* RECOMMENDATION CARD */
  .rec {
    padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px;
    position: relative;
  }
  .rec .name { font-weight: 600; font-size: 0.9rem; }
  .rec .name a { color: inherit; text-decoration: none; }
  .rec .desc { font-size: 0.78rem; color: var(--dim); margin-top: 3px; }
  .rec .meta { font-size: 0.72rem; color: var(--dim); margin-top: 4px; }
  .rec .badge {
    position: absolute; top: 10px; right: 12px; font-size: 0.65rem;
    padding: 2px 8px; border-radius: 10px; font-weight: 600;
  }
  .badge.top { background: rgba(255,106,0,0.2); color: var(--accent); }
  .badge.near { background: rgba(52,152,219,0.2); color: var(--blue); }

  .thumbs { display: flex; gap: 4px; margin-top: 8px; }
  .thumbs button {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    color: var(--dim); font-size: 0.85rem; padding: 3px 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .thumbs button:hover { border-color: var(--accent); }
  .thumbs button.voted-up { background: rgba(46,204,113,0.15); border-color: var(--green); color: var(--green); }
  .thumbs button.voted-down { background: rgba(231,76,60,0.15); border-color: var(--red); color: var(--red); }

  .divider {
    text-align: center; padding: 8px 0; color: var(--dim);
    font-size: 0.72rem;
  }

  .tip {
    font-size: 0.8rem; padding: 10px 12px; border-radius: 8px; margin-top: 10px;
    background: rgba(52,152,219,0.08); border: 1px solid rgba(52,152,219,0.15);
  }
  .tip strong { color: var(--blue); }

  .transit-num {
    display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #000; font-weight: 700;
    align-items: center; justify-content: center;
    font-size: 0.65rem; margin-right: 6px; flex-shrink: 0; vertical-align: middle;
  }

  .footer {
    text-align: center; padding: 20px 0 0; font-size: 0.72rem; color: var(--dim);
    border-top: 1px solid var(--border); margin-top: 16px;
  }
  .footer a { color: var(--dim); }

  .no-day {
    text-align: center; padding: 60px 20px; color: var(--dim);
  }
  .no-day h2 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
</style>
</head>

// ── RENDER ENGINE ────────────────────────────
function getToday() {
  const now = new Date();
  // For demo: if we're before the trip, show Day 1 (Arrival)
  // During the trip: show current day. After: show last day.
  const startDay = new Date(TRIP.start);
  startDay.setHours(0,0,0,0);
  const endDay = new Date(TRIP.end);
  endDay.setHours(23,59,59,999);

  if (now < startDay) return 1; // Show Arrival day as preview
  if (now > endDay) return TRIP.days.length - 1; // Show last day

  const diffMs = now.getTime() - startDay.getTime();
  const dayNum = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  return Math.min(dayNum, TRIP.days.length - 1);
}

function renderDay(idx) {
  const day = TRIP.days[idx];
  if (!day) return;

  // Header
  document.getElementById('dayBadge').textContent = `Day ${idx+1} of ${TRIP.days.length}`;
  document.getElementById('dayTitle').textContent = day.emoji + ' ' + day.label;
  document.getElementById('dayDate').textContent = day.date;

  // Weather
  const w = day.weather;
  let weatherHTML = `
    <div class="w-main">
      <div class="w-icon">${w.icon}</div>
      <div>
        <div class="w-temp">${w.hi}°</div>
        <div class="w-lo">Lo ${w.lo}°F</div>
      </div>
    </div>
    <div class="w-detail">${w.cond}</div>`;
  if (w.alert) weatherHTML += `<div class="w-alert">${w.alert}</div>`;
  document.getElementById('weatherCard').innerHTML = weatherHTML;

  // Pills
  document.getElementById('statusStrip').innerHTML = day.pills.map(p =>
    `<span class="pill ${p.type}">${p.text}</span>`
  ).join('');

  // Timeline
  document.getElementById('timeline').innerHTML = day.timeline.map(t =>
    `<div class="tl-item">
      <div class="tl-time">${t.time}</div>
      <div class="tl-body">${t.body}<div class="sub">${t.sub}</div></div>
    </div>`
  ).join('');

  // Transit
  const tc = document.getElementById('transitCard');
  if (day.transit) {
    tc.style.display = '';
    document.getElementById('transitContent').innerHTML = day.transit.map(s =>
      `<div class="tl-item">
        <div class="tl-time" style="min-width:28px"><span class="transit-num">${s.num}</span></div>
        <div class="tl-body" style="font-size:0.82rem">${s.text}</div>
      </div>`
    ).join('');
  } else {
    tc.style.display = 'none';
  }

  // Food recs
  document.getElementById('foodRecs').innerHTML = day.foods.map(f => {
    const nameHTML = f.maps ? `<a href="https://www.google.com/maps/search/${f.maps}" target="_blank">${f.name}</a>` : f.name;
    return `<div class="rec">
      ${f.badge ? `<span class="badge ${f.badgeClass}">${f.badge}</span>` : ''}
      <div class="name">${nameHTML}</div>
      <div class="desc">${f.desc}</div>
      <div class="meta">${f.meta}</div>
      <div class="thumbs"><button onclick="vote('${f.id}','up',this)" title="Loved it">👍</button><button onclick="vote('${f.id}','down',this)" title="Not for me">👎</button></div>
    </div>`;
  }).join('');

  // Coffee recs
  document.getElementById('coffeeRecs').innerHTML = day.coffees.map(f => {
    const nameHTML = f.maps ? `<a href="https://www.google.com/maps/search/${f.maps}" target="_blank">${f.name}</a>` : f.name;
    return `<div class="rec">
      ${f.badge ? `<span class="badge ${f.badgeClass}">${f.badge}</span>` : ''}
      <div class="name">${nameHTML}</div>
      <div class="desc">${f.desc}</div>
      <div class="meta">${f.meta}</div>
      <div class="thumbs"><button onclick="vote('${f.id}','up',this)" title="Loved it">👍</button><button onclick="vote('${f.id}','down',this)" title="Not for me">👎</button></div>
    </div>`;
  }).join('');

  // Tip
  const tip = day.tip;
  if (tip) {
    document.getElementById('tipsSection').innerHTML = `<div class="tip" style="background:${tip.type==='warn'?'rgba(255,106,0,0.08)':'rgba(52,152,219,0.08)'};border:1px solid ${tip.type==='warn'?'rgba(255,106,0,0.15)':'rgba(52,152,219,0.15)'}">${tip.html}</div>`;
  } else {
    document.getElementById('tipsSection').innerHTML = '';
  }
}

// ── VOTING ────────────────────────────────────
function vote(id, dir, btn) {
  var key = 'vv_vote_' + id;
  var current = localStorage.getItem(key);
  var data = current ? JSON.parse(current) : {up:0, down:0, voted: null};
  var container = btn.parentElement;
  var upBtn = container.children[0];
  var downBtn = container.children[1];

  if (data.voted === dir) {
    data[dir] = Math.max(0, data[dir] - 1);
    data.voted = null;
    upBtn.classList.remove('voted-up');
    downBtn.classList.remove('voted-down');
  } else {
    if (data.voted) data[data.voted] = Math.max(0, data[data.voted] - 1);
    data[dir] = (data[dir] || 0) + 1;
    data.voted = dir;
    upBtn.classList.toggle('voted-up', dir === 'up');
    downBtn.classList.toggle('voted-down', dir === 'down');
  }
  localStorage.setItem(key, JSON.stringify(data));
}

// Restore votes
(function(){
  document.querySelectorAll('.thumbs').forEach(function(el){
    var btn = el.querySelector('button');
    if (!btn) return;
    var match = btn.getAttribute('onclick').match(/vote\('([^']+)'/);
    if (!match) return;
    var id = match[1];
    var data = JSON.parse(localStorage.getItem('vv_vote_' + id) || '{"up":0,"down":0,"voted":null}');
    if (data.voted === 'up') el.children[0].classList.add('voted-up');
    if (data.voted === 'down') el.children[1].classList.add('voted-down');
  });
})();

// ── INIT ──────────────────────────────────────
renderDay(getToday());
</script>
